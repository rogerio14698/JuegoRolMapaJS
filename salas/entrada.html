<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala nombre </title>
    <link rel="stylesheet" href="../main.css">

</head>

<body>
    <main class="contenedor centrarPagina" id="entrada">
        <!-- La clase sala representa la sala principal y se encarda de cargar el fondo de la sala-->
         <div class="tituloSala ">
                <h1 class="fuenteTitulo" id="nombreSala"></h1>
                <p class="fuenteParrafo" id="descripcionSala"></p>
            </div>
        <section class="fondoSala fondoSalaEntrada salaEntrada">
            <section class="heroe">
                <picture>
                    <source srcset="../img/heroe.png" type="image/png">
                    <img src="../img/heroe.png" alt="Imagen-del-heroe" class="imagenHeroe">
                </picture>
            </section>

        </section>

        <section id="contenedor-consola"></section>
    </main>
    <!--Como -->
    <script type="module" src="../app.js"></script>
</body>

</html>
